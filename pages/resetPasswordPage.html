<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HQMart - Đặt lại mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="../js/toast.js" defer></script>
    <script src="../js/api.js"></script>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/toast.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-hero">
        <div class="auth-hero-logo">HQ<span style="font-weight:400">Mart</span></div>
        <h1 class="auth-hero-title">Đặt lại mật khẩu</h1>
        <p class="auth-hero-desc">Tạo mật khẩu mới cho tài khoản của bạn.</p>
      </div>

      <div class="auth-form-panel">
        <div class="auth-form-container">
          <!-- Loading state -->
          <div id="verification-loading" style="text-align:center;padding:3rem 0;">
            <span class="material-symbols-outlined" style="font-size:2.5rem;color:var(--hq-primary);animation:spin 1s linear infinite">progress_activity</span>
            <p style="color:var(--hq-text-muted);margin-top:1rem">Đang xác thực token...</p>
          </div>

          <!-- Token invalid -->
          <div id="token-invalid" class="hidden" style="text-align:center;padding:3rem 0;">
            <span class="material-symbols-outlined" style="font-size:3rem;color:var(--hq-sale)">error</span>
            <h3 style="font-size:1.25rem;font-weight:700;color:var(--hq-text);margin:1rem 0 0.5rem">Link không hợp lệ</h3>
            <p style="color:var(--hq-text-muted);margin-bottom:1.5rem">Link đặt lại mật khẩu đã hết hạn hoặc không hợp lệ.</p>
            <a href="resetpwPage.html" class="btn btn-primary">Yêu cầu link mới</a>
          </div>

          <!-- Reset form -->
          <form id="reset-password-form" class="hidden">
            <div class="auth-form-header">
              <h2 class="auth-form-title">Tạo mật khẩu mới</h2>
              <p class="auth-form-subtitle">Mật khẩu phải ít nhất 6 ký tự</p>
            </div>

            <div class="auth-input-group">
              <label class="auth-input-label" for="new-password">Mật khẩu mới</label>
              <div class="auth-input-wrapper">
                <span class="material-symbols-outlined auth-input-icon">lock</span>
                <input class="auth-input" id="new-password" type="password" placeholder="Nhập mật khẩu mới" required />
              </div>
              <div class="password-strength" style="margin-top:0.5rem">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <p class="strength-text" id="strength-text"></p>
              </div>
            </div>
            <div class="auth-input-group">
              <label class="auth-input-label" for="confirm-password">Xác nhận mật khẩu</label>
              <div class="auth-input-wrapper">
                <span class="material-symbols-outlined auth-input-icon">lock</span>
                <input class="auth-input" id="confirm-password" type="password" placeholder="Nhập lại mật khẩu" required />
              </div>
            </div>
            <button class="auth-submit-btn" type="submit">Đặt lại mật khẩu</button>

            <div id="error-message" class="auth-message error hidden" style="margin-top:1rem"></div>
            <div id="success-message" class="auth-message success hidden" style="margin-top:1rem"></div>
          </form>

          <div style="text-align:center;margin-top:2rem">
            <a href="loginPage.html" style="display:inline-flex;align-items:center;gap:0.25rem;color:var(--hq-text-muted);font-size:0.875rem;font-weight:500"><span class="material-symbols-outlined" style="font-size:1rem">arrow_back</span>Quay lại đăng nhập</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      document.fonts.ready.then(() => document.body.classList.add('font-loaded'));

      const urlParams = new URLSearchParams(window.location.search);
      const resetToken = urlParams.get('token');

      if (!resetToken) showTokenInvalid();
      else verifyToken();

      function showTokenInvalid() {
        document.getElementById('verification-loading').classList.add('hidden');
        document.getElementById('token-invalid').classList.remove('hidden');
        document.getElementById('reset-password-form').classList.add('hidden');
      }
      function showForm() {
        document.getElementById('verification-loading').classList.add('hidden');
        document.getElementById('reset-password-form').classList.remove('hidden');
      }
      async function verifyToken() {
        try {
          const res = await AuthAPI.verifyResetToken(resetToken);
          if (res.success) showForm(); else showTokenInvalid();
        } catch(e) { showTokenInvalid(); }
      }

      // Password strength
      document.getElementById('new-password').addEventListener('input', function() {
        const pw = this.value;
        let strength = 0;
        if (pw.length >= 6) strength++;
        if (pw.length >= 10) strength++;
        if (/[a-z]/.test(pw)) strength++;
        if (/[A-Z]/.test(pw)) strength++;
        if (/[0-9]/.test(pw)) strength++;
        if (/[^a-zA-Z0-9]/.test(pw)) strength++;

        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');
        fill.className = 'strength-fill';
        if (strength < 3) { fill.classList.add('weak'); text.className = 'strength-text weak'; text.textContent = 'Yếu'; }
        else if (strength < 5) { fill.classList.add('medium'); text.className = 'strength-text medium'; text.textContent = 'Trung bình'; }
        else { fill.classList.add('strong'); text.className = 'strength-text strong'; text.textContent = 'Mạnh'; }
      });

      // Submit
      document.getElementById('reset-password-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        const btn = this.querySelector('button[type="submit"]');
        errorDiv.classList.add('hidden');
        successDiv.classList.add('hidden');

        if (!newPassword || !confirmPassword) { errorDiv.textContent = 'Vui lòng nhập và xác nhận mật khẩu'; errorDiv.classList.remove('hidden'); return; }
        if (newPassword.length < 6) { errorDiv.textContent = 'Mật khẩu phải ít nhất 6 ký tự'; errorDiv.classList.remove('hidden'); return; }
        if (newPassword !== confirmPassword) { errorDiv.textContent = 'Mật khẩu xác nhận không khớp'; errorDiv.classList.remove('hidden'); return; }

        const originalText = btn.textContent;
        btn.textContent = 'Đang xử lý...';
        btn.disabled = true;
        try {
          await AuthAPI.resetPassword(resetToken, newPassword);
          successDiv.textContent = 'Đặt lại mật khẩu thành công! Đang chuyển hướng...';
          successDiv.classList.remove('hidden');
          setTimeout(() => window.location.href = 'loginPage.html', 2000);
        } catch(e) {
          errorDiv.textContent = e.message || 'Không thể đặt lại mật khẩu';
          errorDiv.classList.remove('hidden');
        } finally { btn.textContent = originalText; btn.disabled = false; }
      });
    </script>
    <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
  </body>
</html>
